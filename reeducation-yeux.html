<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rééducation Oculaire</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1a;
    --surface: #111827;
    --card: #1a2235;
    --accent: #4fc3f7;
    --accent2: #81d4fa;
    --gold: #ffd54f;
    --text: #e8f4fd;
    --muted: #7b9bb5;
    --border: #1e3a5f;
    --glow: rgba(79, 195, 247, 0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(79,195,247,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(129,212,250,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    position: relative;
    z-index: 1;
  }
  header { text-align: center; padding: 3rem 0 2.5rem; }
  .eye-icon { width: 64px; height: 64px; margin: 0 auto 1.2rem; }
  .eye-icon svg {
    width: 100%; height: 100%;
    filter: drop-shadow(0 0 12px rgba(79,195,247,0.6));
    animation: eyePulse 4s ease-in-out infinite;
  }
  @keyframes eyePulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.06); opacity: 0.85; }
  }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent), var(--accent2), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }
  .subtitle { color: var(--muted); font-size: 1rem; font-weight: 300; letter-spacing: 0.05em; }
  .session-bar {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 1rem 1.5rem; margin-bottom: 2rem;
  }
  .session-info { font-size: 0.85rem; color: var(--muted); }
  .session-info strong { color: var(--accent); font-weight: 500; }
  .progress-wrap { flex: 1; margin: 0 2rem; height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold)); border-radius: 4px; transition: width 0.5s ease; width: 0%; }
  .exercises-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .exercise-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.4rem; cursor: pointer;
    transition: all 0.25s ease; position: relative; overflow: hidden;
  }
  .exercise-card::before {
    content: ''; position: absolute; inset: 0; background: var(--glow);
    opacity: 0; transition: opacity 0.25s; border-radius: inherit;
  }
  .exercise-card:hover::before { opacity: 1; }
  .exercise-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(79,195,247,0.12); }
  .exercise-card.done { border-color: #2e7d32; background: #0d1f10; }
  .card-num { font-size: 0.7rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.5rem; }
  .card-title { font-family: 'DM Serif Display', serif; font-size: 1.1rem; margin-bottom: 0.4rem; color: var(--text); }
  .card-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }
  .card-duration { display: inline-flex; align-items: center; gap: 0.3rem; margin-top: 0.8rem; font-size: 0.75rem; color: var(--accent); background: rgba(79,195,247,0.08); padding: 0.2rem 0.6rem; border-radius: 20px; }
  .done-badge { position: absolute; top: 0.8rem; right: 0.8rem; background: #2e7d32; color: #a5d6a7; font-size: 0.65rem; padding: 0.15rem 0.5rem; border-radius: 20px; font-weight: 500; }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px);
    z-index: 100; display: flex; align-items: center; justify-content: center; padding: 1rem;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 2rem;
    position: relative; transform: translateY(20px); transition: transform 0.3s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-close {
    position: absolute; top: 1rem; right: 1rem; background: var(--card);
    border: 1px solid var(--border); color: var(--muted); width: 32px; height: 32px;
    border-radius: 50%; cursor: pointer; font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .modal-close:hover { color: var(--text); border-color: var(--accent); }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 1.6rem; margin-bottom: 0.5rem; color: var(--accent); }
  .modal-subtitle { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.5rem; }
  .anim-zone {
    background: #050d18; border: 1px solid var(--border); border-radius: 14px;
    height: 200px; display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.5rem; position: relative; overflow: hidden;
  }
  .dot { width: 16px; height: 16px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 20px var(--accent); position: absolute; }
  .track-h .dot { animation: trackH 3s ease-in-out infinite; }
  @keyframes trackH { 0%, 100% { transform: translateX(-120px); } 50% { transform: translateX(120px); } }
  .track-v .dot { animation: trackV 3s ease-in-out infinite; }
  @keyframes trackV { 0%, 100% { transform: translateY(-70px); } 50% { transform: translateY(70px); } }
  .track-c .dot { animation: trackC 4s linear infinite; }
  @keyframes trackC {
    0% { transform: translate(80px, 0); } 25% { transform: translate(0, 70px); }
    50% { transform: translate(-80px, 0); } 75% { transform: translate(0, -70px); }
    100% { transform: translate(80px, 0); }
  }
  .converge .dot-l { width: 14px; height: 14px; background: #ef5350; box-shadow: 0 0 16px #ef5350; border-radius: 50%; position: absolute; animation: convergeL 3s ease-in-out infinite; }
  .converge .dot-r { width: 14px; height: 14px; background: #42a5f5; box-shadow: 0 0 16px #42a5f5; border-radius: 50%; position: absolute; animation: convergeR 3s ease-in-out infinite; }
  @keyframes convergeL { 0%, 100% { transform: translateX(-100px); } 50% { transform: translateX(0px); } }
  @keyframes convergeR { 0%, 100% { transform: translateX(100px); } 50% { transform: translateX(0px); } }
  .blink-anim .eye-shape { width: 90px; height: 50px; position: relative; }
  .blink-anim .eye-shape svg { width: 100%; height: 100%; animation: blinkAnim 3s ease-in-out infinite; filter: drop-shadow(0 0 10px rgba(79,195,247,0.5)); }
  @keyframes blinkAnim { 0%, 40%, 60%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.05); } }
  .relax-anim { text-align: center; color: var(--gold); }
  .relax-num { font-family: 'DM Serif Display', serif; font-size: 4rem; }
  .relax-label { font-size: 0.8rem; color: var(--muted); margin-top: 0.3rem; }
  .track-8 .dot { animation: track8 5s linear infinite; }
  @keyframes track8 {
    0% { transform: translate(0, 0); } 12.5% { transform: translate(80px, -50px); }
    25% { transform: translate(0, 0); } 37.5% { transform: translate(-80px, -50px); }
    50% { transform: translate(0, 0); } 62.5% { transform: translate(80px, 50px); }
    75% { transform: translate(0, 0); } 87.5% { transform: translate(-80px, 50px); }
    100% { transform: translate(0, 0); }
  }
  .focus-anim .dot-near { width: 20px; height: 20px; background: var(--gold); box-shadow: 0 0 20px var(--gold); border-radius: 50%; position: absolute; animation: focusNear 4s ease-in-out infinite; }
  .focus-anim .dot-far { width: 8px; height: 8px; background: var(--accent); box-shadow: 0 0 10px var(--accent); border-radius: 50%; position: absolute; animation: focusFar 4s ease-in-out infinite; }
  @keyframes focusNear { 0%, 50%, 100% { opacity: 1; transform: scale(1) translateX(-40px); } 25%, 75% { opacity: 0.2; transform: scale(0.5) translateX(-40px); } }
  @keyframes focusFar { 0%, 50%, 100% { opacity: 0.2; transform: scale(0.5) translateX(40px); } 25%, 75% { opacity: 1; transform: scale(1) translateX(40px); } }
  .instructions { background: var(--card); border-left: 3px solid var(--accent); border-radius: 0 10px 10px 0; padding: 1rem 1.2rem; margin-bottom: 1.5rem; }
  .instructions h4 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 0.6rem; }
  .instructions ol { list-style: none; counter-reset: step; }
  .instructions ol li { counter-increment: step; display: flex; gap: 0.7rem; font-size: 0.88rem; color: var(--muted); line-height: 1.6; margin-bottom: 0.4rem; align-items: flex-start; }
  .instructions ol li::before { content: counter(step); background: rgba(79,195,247,0.15); color: var(--accent); min-width: 20px; height: 20px; border-radius: 50%; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
  .timer-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
  .timer-display { font-family: 'DM Serif Display', serif; font-size: 2.5rem; color: var(--gold); min-width: 80px; }
  .timer-progress { flex: 1; height: 6px; background: var(--border); border-radius: 6px; overflow: hidden; }
  .timer-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--accent)); border-radius: 6px; transition: width 1s linear; width: 100%; }
  .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.7rem 1.5rem; border-radius: 10px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), #0288d1); color: #fff; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,195,247,0.3); }
  .btn-done { background: linear-gradient(135deg, #2e7d32, #388e3c); color: #fff; }
  .btn-row { display: flex; gap: 0.8rem; flex-wrap: wrap; }
  .warning-box { background: rgba(255, 213, 79, 0.07); border: 1px solid rgba(255, 213, 79, 0.25); border-radius: 12px; padding: 1rem 1.2rem; font-size: 0.82rem; color: #ffd54f99; text-align: center; margin-top: 2rem; line-height: 1.6; }
  .warning-box strong { color: var(--gold); }
  @media (max-width: 480px) {
    .session-bar { flex-direction: column; gap: 0.8rem; }
    .progress-wrap { margin: 0; width: 100%; }
    .exercises-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="eye-icon">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="32" cy="32" rx="28" ry="18" stroke="#4fc3f7" stroke-width="2.5"/>
        <circle cx="32" cy="32" r="10" stroke="#4fc3f7" stroke-width="2.5"/>
        <circle cx="32" cy="32" r="5" fill="#4fc3f7" opacity="0.7"/>
        <circle cx="28" cy="28" r="2" fill="#fff" opacity="0.5"/>
      </svg>
    </div>
    <h1>Gym Oculaire</h1>
    <p class="subtitle">Programme de rééducation visuelle guidée · 8 exercices</p>
  </header>

  <div class="session-bar">
    <div class="session-info">Séance du <strong id="dateDisplay"></strong></div>
    <div class="progress-wrap"><div class="progress-fill" id="progressBar"></div></div>
    <div class="session-info"><strong id="doneCount">0</strong> / 8 faits</div>
  </div>

  <div class="exercises-grid" id="exercisesGrid"></div>

  <div class="warning-box">
    ⚠️ <strong>Attention :</strong> Ces exercices sont à titre informatif et ne remplacent pas l'avis d'un orthoptiste ou ophtalmologue. En cas de douleur, arrêtez immédiatement et consultez un professionnel.
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
const exercises = [
  { id:1, title:"Suivi horizontal", desc:"Entraîne les muscles horizontaux et améliore la coordination.", duration:60, animClass:"track-h", animHTML:'<div class="dot"></div>', steps:["Fixez le point bleu qui se déplace de gauche à droite.","Gardez la tête immobile, bougez uniquement les yeux.","Suivez le point à vitesse régulière, sans anticiper.","Répétez pendant 60 secondes."] },
  { id:2, title:"Suivi vertical", desc:"Renforce les muscles verticaux et réduit la fatigue.", duration:60, animClass:"track-v", animHTML:'<div class="dot"></div>', steps:["Suivez le point qui monte et descend.","Tête droite et immobile tout au long.","Respirez lentement et régulièrement.","Maintenez l'exercice 60 secondes."] },
  { id:3, title:"Suivi circulaire", desc:"Travaille tous les muscles oculomoteurs en rotation complète.", duration:90, animClass:"track-c", animHTML:'<div class="dot"></div>', steps:["Suivez le point qui décrit un grand cercle.","Ne tournez pas la tête.","Faites 5 rotations dans le sens horaire, puis anti-horaire.","Durée totale : 90 secondes."] },
  { id:4, title:"Convergence", desc:"Exercice clé pour corriger la vision binoculaire et la diplopie.", duration:60, animClass:"converge", animHTML:'<div class="dot-l"></div><div class="dot-r"></div>', steps:["Les deux points représentent vos deux yeux.","Convergez votre regard comme s'ils se rejoignaient au centre.","Maintenez la fusion 3 secondes, puis relâchez.","Répétez 10 fois."] },
  { id:5, title:"Clignement conscient", desc:"Réhydrate les yeux secs et rétablit le film lacrymal.", duration:30, animClass:"blink-anim", animHTML:'<div class="eye-shape"><svg viewBox="0 0 90 50"><ellipse cx="45" cy="25" rx="40" ry="22" stroke="#4fc3f7" stroke-width="2.5" fill="none"/><circle cx="45" cy="25" r="12" stroke="#4fc3f7" stroke-width="2" fill="rgba(79,195,247,0.15)"/><circle cx="45" cy="25" r="5" fill="#4fc3f7"/></svg></div>', steps:["Regardez l'œil qui cligne sur l'écran.","Clignez vous-même des yeux au même rythme.","Fermez bien les deux paupières à chaque clignement.","30 secondes de clignements complets et lents."] },
  { id:6, title:"Règle des 20-20-20", desc:"Anti-fatigue numérique : 20 min d'écran → 20 sec au loin.", duration:20, animClass:"relax-anim", animHTML:'<div><div class="relax-num">20</div><div class="relax-label">secondes · regardez à 6 mètres</div></div>', steps:["Toutes les 20 minutes d'écran, faites une pause.","Regardez un objet à au moins 6 mètres de vous.","Maintenez le regard au loin pendant 20 secondes.","Clignez doucement pendant cette pause."] },
  { id:7, title:"Tracé en 8", desc:"Améliore la coordination et la fluidité des mouvements oculaires.", duration:90, animClass:"track-8", animHTML:'<div class="dot"></div>', steps:["Suivez le point qui trace un grand chiffre 8 couché (∞).","Gardez la tête fixe, yeux souples.","Imaginez tracer le parcours vous-même.","Répétez pendant 90 secondes."] },
  { id:8, title:"Focus proche-loin", desc:"Entraîne l'accommodation : passage du proche à l'infini.", duration:60, animClass:"focus-anim", animHTML:'<div class="dot-near"></div><div class="dot-far"></div>', steps:["Le point doré (proche) et le point bleu (loin) alternent.","Regardez le point lumineux quand il brille.","Prenez 1 à 2 secondes pour accommoder à chaque changement.","Continuez pendant 60 secondes."] }
];

const doneSet = new Set();

function updateProgress() {
  document.getElementById('doneCount').textContent = doneSet.size;
  document.getElementById('progressBar').style.width = (doneSet.size / exercises.length * 100) + '%';
}

function renderGrid() {
  const grid = document.getElementById('exercisesGrid');
  grid.innerHTML = '';
  exercises.forEach((ex, i) => {
    const done = doneSet.has(ex.id);
    const card = document.createElement('div');
    card.className = 'exercise-card' + (done ? ' done' : '');
    card.innerHTML = `${done ? '<span class="done-badge">✓ Fait</span>' : ''}<div class="card-num">Exercice ${String(i+1).padStart(2,'0')}</div><div class="card-title">${ex.title}</div><div class="card-desc">${ex.desc}</div><div class="card-duration">⏱ ${ex.duration}s</div>`;
    card.addEventListener('click', () => openModal(ex));
    grid.appendChild(card);
  });
}

let timerInterval = null;

function openModal(ex) {
  clearInterval(timerInterval);
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <div class="modal-title">${ex.title}</div>
    <div class="modal-subtitle">Exercice ${ex.id} · ${ex.duration} secondes</div>
    <div class="anim-zone ${ex.animClass}">${ex.animHTML}</div>
    <div class="instructions">
      <h4>Instructions</h4>
      <ol>${ex.steps.map(s => `<li>${s}</li>`).join('')}</ol>
    </div>
    <div class="timer-row">
      <div class="timer-display" id="timerDisplay">${ex.duration}s</div>
      <div class="timer-progress"><div class="timer-fill" id="timerFill"></div></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="startBtn">▶ Démarrer</button>
      <button class="btn btn-done" id="doneBtn">✓ Marquer fait</button>
    </div>`;
  document.getElementById('startBtn').addEventListener('click', () => startTimer(ex));
  document.getElementById('doneBtn').addEventListener('click', () => { markDone(ex); closeModal(); });
  overlay.classList.add('open');
}

function startTimer(ex) {
  clearInterval(timerInterval);
  let left = ex.duration;
  const btn = document.getElementById('startBtn');
  btn.textContent = '⏸ En cours…'; btn.disabled = true;
  timerInterval = setInterval(() => {
    left--;
    const d = document.getElementById('timerDisplay');
    const f = document.getElementById('timerFill');
    if (d) d.textContent = left + 's';
    if (f) f.style.width = (left / ex.duration * 100) + '%';
    if (left <= 0) {
      clearInterval(timerInterval);
      if (d) d.textContent = '✓';
      markDone(ex);
      setTimeout(closeModal, 800);
    }
  }, 1000);
}

function markDone(ex) {
  doneSet.add(ex.id);
  updateProgress();
  renderGrid();
}

function closeModal() {
  clearInterval(timerInterval);
  document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === document.getElementById('modalOverlay')) closeModal(); });

const d = new Date();
document.getElementById('dateDisplay').textContent = d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });
updateProgress();
renderGrid();
</script>
</body>
</html>
